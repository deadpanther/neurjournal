<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeurJournal — Emotional Activation Mapping</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&family=IBM+Plex+Mono:wght@300;400;500;600&family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,700&display=swap');
  :root {
    --bg:#08090e;--s1:#0e1018;--s2:#111320;--bd:#1c1f2e;--bd2:#2a2d3e;
    --t1:#ececf1;--t2:#c5c5d2;--t3:#8e8ea0;--t4:#6e6e80;--t5:#4e4e60;--dim:#2a2d3e;
    --mono:'IBM Plex Mono',monospace;--body:'DM Sans',system-ui,sans-serif;--display:'Fraunces',serif;
    --accent:#a78bfa;--green:#6ee7b7;--amber:#fcd34d;--cyan:#67e8f9;
    --glow1:#a78bfa22;--glow2:#67e8f918;
    --glass:rgba(14,16,24,.72);--glass-bd:rgba(255,255,255,.06);
    --radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{background:var(--bg);color:var(--t2);font-family:var(--body);-webkit-font-smoothing:antialiased}

  #app{display:grid;grid-template-columns:440px 1fr;height:100vh}

  /* ── LEFT PANEL ── */
  .panel{background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;position:relative}
  .panel::before{content:'';position:absolute;top:0;left:0;right:0;height:280px;
    background:radial-gradient(ellipse at 30% 0%,#a78bfa08,transparent 60%),radial-gradient(ellipse at 70% 0%,#67e8f906,transparent 50%);
    pointer-events:none;z-index:0}
  .panel>*{position:relative;z-index:1}
  .panel-header{padding:28px 26px 20px;border-bottom:1px solid var(--bd);flex-shrink:0}
  .logo{display:flex;align-items:center;gap:12px;margin-bottom:6px}
  .logo h1{font:500 22px/1 var(--display);color:var(--t1);letter-spacing:-.5px}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:all .4s}
  .badge{font:500 8px var(--mono);padding:3px 10px;border-radius:20px;transition:all .3s;letter-spacing:.8px;text-transform:uppercase}
  .sub{font:300 12px/1.5 var(--body);color:var(--t4);letter-spacing:.2px;margin-top:2px}

  .input-wrap{padding:20px 26px;border-bottom:1px solid var(--bd);flex-shrink:0}
  .input-wrap textarea{
    width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:var(--radius);
    color:var(--t1);font:400 14px/1.7 var(--body);padding:16px 18px;resize:none;outline:none;
    transition:border-color .3s,box-shadow .3s}
  .input-wrap textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px #a78bfa12,0 0 20px #a78bfa08}
  .input-wrap textarea::placeholder{color:var(--t5)}
  .input-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
  .hint{font:400 10px var(--mono);color:var(--t5);letter-spacing:.3px}
  .btn{font:500 12px var(--body);padding:10px 28px;border:none;border-radius:10px;cursor:pointer;color:#fff;transition:all .25s;letter-spacing:.3px}
  .btn-go{background:var(--accent);box-shadow:0 2px 12px #a78bfa33,inset 0 1px 0 #ffffff15}
  .btn-go:hover{filter:brightness(1.12);box-shadow:0 4px 20px #a78bfa44;transform:translateY(-1px)}
  .btn-go:disabled{opacity:.3;cursor:default;filter:none;box-shadow:none;transform:none}
  .btn-wait{background:#f59e0b;box-shadow:0 2px 12px #f59e0b33;cursor:wait}

  .tabs{display:flex;gap:0;margin:16px 22px 0;background:var(--bg);border-radius:12px;padding:4px;border:1px solid var(--bd)}
  .tab{flex:1;padding:9px 0;border:none;border-radius:9px;background:transparent;color:var(--t5);font:500 11px var(--body);cursor:pointer;transition:all .25s;letter-spacing:.2px}
  .tab.on{background:var(--s2);color:var(--t1);box-shadow:0 1px 3px #0003,inset 0 1px 0 var(--glass-bd)}
  .tab:hover:not(.on){color:var(--t3)}

  .entries{flex:1;overflow-y:auto;padding:14px 22px 22px;scroll-behavior:smooth}
  .entries::-webkit-scrollbar{width:3px}
  .entries::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
  .entries::-webkit-scrollbar-thumb:hover{background:var(--bd2)}

  .card{
    background:var(--s2);border:1px solid var(--bd);border-radius:var(--radius);
    padding:18px;margin-bottom:8px;cursor:pointer;transition:all .25s;border-left:3px solid transparent;position:relative;overflow:hidden}
  .card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#a78bfa05,transparent);opacity:0;transition:opacity .3s}
  .card:hover{border-color:var(--bd2);transform:translateY(-1px);box-shadow:0 4px 16px #0002}.card:hover::after{opacity:1}
  .card.sel{border-left-color:var(--accent);background:linear-gradient(135deg,#a78bfa08,var(--s2))}
  .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;position:relative;z-index:1}
  .card-dom{font:600 12px var(--body);color:var(--t1)}
  .card-time{font:400 10px var(--mono);color:var(--t5)}
  .card-text{font:400 13px/1.7 var(--body);color:var(--t3);margin-bottom:10px;position:relative;z-index:1}
  .card-tags{display:flex;gap:6px;flex-wrap:wrap;position:relative;z-index:1}
  .tag{font:500 9px var(--mono);padding:4px 10px;border-radius:20px;letter-spacing:.3px}

  /* ── RIGHT PANEL (3D) ── */
  .viewer{position:relative;background:var(--bg);overflow:hidden}
  .viewer::before{content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 40%,#a78bfa06,transparent 60%),radial-gradient(ellipse at 30% 70%,#67e8f904,transparent 50%);
    pointer-events:none;z-index:1}
  #cv{width:100%;height:100%;display:block}

  .ov-regions{
    position:absolute;top:20px;right:20px;width:260px;
    background:var(--glass);backdrop-filter:blur(24px) saturate(1.2);
    border:1px solid var(--glass-bd);border-radius:var(--radius);padding:20px;
    transition:opacity .4s;pointer-events:auto;z-index:2;box-shadow:0 8px 40px #00000050}
  .ov-title{font:500 9px var(--mono);color:var(--t4);text-transform:uppercase;letter-spacing:2px;margin-bottom:14px}
  .rr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .rr-name{font:400 10px var(--mono);color:var(--t3);width:115px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rr-bg{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
  .rr-bar{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1)}
  .rr-val{font:500 10px var(--mono);color:var(--t4);width:34px;text-align:right}

  .ov-summary{
    position:absolute;top:20px;left:20px;max-width:340px;
    background:var(--glass);backdrop-filter:blur(24px) saturate(1.2);
    border:1px solid var(--glass-bd);border-radius:var(--radius);padding:18px 20px;
    display:none;z-index:2;box-shadow:0 8px 40px #00000050}
  .ov-summary .s-label{font:500 9px var(--mono);color:var(--t4);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
  .ov-summary .s-text{font:400 14px/1.6 var(--body);color:var(--t1)}
  .ov-summary .s-meta{font:400 10px var(--mono);color:var(--t5);margin-top:10px}

  .controls{
    position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    display:flex;gap:4px;background:var(--glass);backdrop-filter:blur(24px) saturate(1.2);
    border:1px solid var(--glass-bd);border-radius:14px;padding:6px 8px;z-index:2;box-shadow:0 8px 40px #00000050}
  .cb{font:500 11px var(--body);padding:8px 18px;border:1px solid transparent;border-radius:10px;background:transparent;color:var(--t4);cursor:pointer;transition:all .25s}
  .cb:hover{background:rgba(255,255,255,.04);color:var(--t2)}
  .cb.on{background:var(--accent);color:#fff;box-shadow:0 2px 10px #a78bfa44}

  .load-ov{
    position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:10;transition:opacity .6s}
  .load-ov.hide{opacity:0;pointer-events:none}
  .spin{width:36px;height:36px;border:2px solid var(--bd);border-top-color:var(--accent);border-radius:50%;animation:sp .8s linear infinite}
  .load-ov p{font:400 12px var(--body);color:var(--t4);margin-top:18px}
  @keyframes sp{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}

  .colorbar{
    position:absolute;bottom:90px;right:20px;width:22px;height:160px;
    background:var(--glass);backdrop-filter:blur(24px);
    border:1px solid var(--glass-bd);border-radius:12px;padding:8px 5px;
    display:flex;flex-direction:column;align-items:center;gap:4px;z-index:2}
  .colorbar canvas{width:10px;flex:1;border-radius:5px}
  .colorbar span{font:400 8px var(--mono);color:var(--t5)}

  /* ── MEMORY TAB ── */
  .mem-search{padding:12px 0 8px}
  .mem-search input{
    width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:12px;
    color:var(--t1);font:400 13px var(--body);padding:13px 16px;outline:none;transition:all .3s}
  .mem-search input:focus{border-color:#67e8f988;box-shadow:0 0 0 3px #67e8f910,0 0 20px #67e8f908}
  .mem-search input::placeholder{color:var(--t5)}
  .mem-convos{display:flex;gap:8px;margin:8px 0 14px;flex-wrap:wrap}
  .mem-convo{
    flex:1;min-width:140px;background:var(--s2);
    border:1px solid var(--bd);border-radius:var(--radius);padding:14px;font:400 11px var(--body);transition:all .25s}
  .mem-convo:hover{border-color:var(--bd2);transform:translateY(-1px)}
  .mem-convo .mc-speakers{color:var(--cyan);font-weight:600;margin-bottom:6px;font-size:13px;font-family:var(--body)}
  .mem-convo .mc-meta{color:var(--t5);font-size:10px;font-family:var(--mono)}
  .mem-answer{
    background:linear-gradient(135deg,#67e8f906,#a78bfa06);border:1px solid rgba(103,232,249,.12);
    border-radius:var(--radius);padding:18px;margin:14px 0;animation:fadeIn .4s ease-out}
  .mem-answer .ma-label{font:500 9px var(--mono);color:var(--cyan);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
  .mem-answer .ma-text{font:400 14px/1.8 var(--body);color:var(--t1)}
  .mem-answer .ma-meta{font:400 10px var(--mono);color:var(--t5);margin-top:10px}
  .mem-card{
    background:var(--s2);border:1px solid var(--bd);border-radius:var(--radius);padding:16px;margin-bottom:8px;
    border-left:3px solid var(--cyan);cursor:pointer;transition:all .25s;animation:slideIn .3s ease-out}
  .mem-card:hover{border-color:var(--bd2);transform:translateY(-1px);box-shadow:0 4px 16px #0002}
  .mem-card .mc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .mem-card .mc-speaker{font:600 12px var(--body);color:var(--cyan)}
  .mem-card .mc-score{font:400 10px var(--mono);color:var(--t5);background:rgba(103,232,249,.06);padding:2px 8px;border-radius:20px}
  .mem-card .mc-text{font:400 13px/1.7 var(--body);color:var(--t3)}
  .mem-card .mc-date{font:400 10px var(--mono);color:var(--t5);margin-top:6px}
  .mem-samples{margin-top:14px}
  .mem-samples .ms-title{font:500 9px var(--mono);color:var(--t4);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
  .mem-sq{
    font:400 12px var(--body);color:var(--t3);padding:10px 14px;background:var(--s2);
    border:1px solid var(--bd);border-radius:12px;margin-bottom:6px;cursor:pointer;transition:all .25s}
  .mem-sq:hover{border-color:rgba(103,232,249,.2);color:var(--t1);transform:translateX(4px)}

  /* ── MEMORY HISTORY ── */
  .mem-hist{margin-bottom:14px}
  .mem-hist-item{
    display:flex;align-items:center;gap:10px;padding:11px 14px;
    background:var(--s2);border:1px solid var(--bd);border-radius:12px;
    margin-bottom:5px;cursor:pointer;transition:all .25s;overflow:hidden}
  .mem-hist-item:hover{border-color:var(--bd2);transform:translateY(-1px)}
  .mem-hist-item.sel{border-left:3px solid var(--accent);background:linear-gradient(135deg,#a78bfa08,var(--s2))}
  .mem-hist-q{flex:1;font:400 12px/1.4 var(--body);color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mem-hist-item.sel .mem-hist-q{color:var(--t1)}
  .mem-hist-meta{font:400 9px var(--mono);color:var(--t5);white-space:nowrap;flex-shrink:0}
  .mem-hist-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

  /* ── TIMELINE TAB ── */
  .tl-wrap{display:flex;flex-direction:column;height:100%}
  .tl-chart-wrap{position:relative;padding:8px 0;flex-shrink:0}
  .tl-chart-wrap canvas{width:100%;height:180px;border-radius:12px;background:var(--bg);border:1px solid var(--bd);cursor:crosshair;display:block}
  .tl-legend{display:flex;flex-wrap:wrap;gap:4px 10px;padding:6px 0}
  .tl-leg-item{display:flex;align-items:center;gap:4px;font:400 10px var(--mono);color:var(--t4)}
  .tl-leg-dot{width:5px;height:5px;border-radius:50%}
  .tl-queries{flex:1;overflow-y:auto;margin-top:6px}
  .tl-qrow{
    display:flex;align-items:center;gap:10px;padding:10px 14px;
    background:var(--s2);border:1px solid var(--bd);border-radius:12px;
    margin-bottom:4px;cursor:pointer;transition:all .25s;overflow:hidden}
  .tl-qrow:hover{border-color:var(--bd2);transform:translateY(-1px)}
  .tl-qrow.sel{border-left:3px solid var(--accent);background:linear-gradient(135deg,#a78bfa08,var(--s2))}
  .tl-qrow-num{font:600 11px var(--mono);color:var(--t5);width:22px;text-align:center;flex-shrink:0}
  .tl-qrow.sel .tl-qrow-num{color:var(--accent)}
  .tl-qrow-q{flex:1;font:400 12px/1.4 var(--body);color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tl-qrow.sel .tl-qrow-q{color:var(--t1)}
  .tl-qrow-top{font:400 9px var(--mono);color:var(--t5);white-space:nowrap;flex-shrink:0}
  .tl-tooltip{
    position:absolute;padding:10px 12px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-bd);border-radius:12px;
    font:400 10px var(--mono);color:var(--t2);pointer-events:none;z-index:10;
    box-shadow:0 8px 32px #00000050;transition:opacity .15s;max-width:260px}

  /* ── DELTA BADGES ── */
  .delta-ov{
    position:absolute;bottom:80px;left:20px;z-index:3;display:flex;flex-direction:column;gap:5px;
    transition:opacity .4s;pointer-events:none}
  .delta-badge{
    display:flex;align-items:center;gap:6px;padding:7px 14px;
    background:var(--glass);backdrop-filter:blur(16px);
    border:1px solid var(--glass-bd);border-radius:10px;font:400 11px var(--mono);animation:slideIn .3s ease-out;
    box-shadow:0 4px 20px #00000040}
  .delta-badge .db-arrow{font-size:13px;font-weight:700}
  .delta-badge .db-name{color:var(--t3)}
  .delta-badge .db-val{font-weight:600}

  /* ── PLAYBACK ── */
  .playback{
    position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    display:none;gap:4px;background:var(--glass);backdrop-filter:blur(24px);
    border:1px solid var(--glass-bd);border-radius:14px;padding:6px 8px;z-index:2;box-shadow:0 8px 40px #00000050;align-items:center}
  .playback.show{display:flex}
  .pb{font:500 13px var(--body);padding:7px 16px;border:1px solid transparent;border-radius:10px;background:transparent;color:var(--t4);cursor:pointer;transition:all .25s;min-width:36px;text-align:center}
  .pb:hover{background:rgba(255,255,255,.04);color:var(--t2)}
  .pb.on{background:var(--accent);color:#fff;box-shadow:0 2px 10px #a78bfa44}
  .pb-label{font:400 10px var(--mono);color:var(--t5);padding:4px 8px;display:flex;align-items:center}

  /* ── VOICE INPUT ── */
  .mic-btn{
    width:38px;height:38px;border:1px solid var(--bd);border-radius:10px;background:transparent;
    color:var(--t4);cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .mic-btn:hover{background:rgba(255,255,255,.04);color:var(--t2);border-color:var(--bd2)}
  .mic-btn.recording{background:rgba(248,113,113,.12);border-color:#f87171;color:#f87171;animation:pulse 1s infinite}
  .mic-btn svg{width:16px;height:16px;fill:currentColor}

  /* ── BRAIN TOOLTIP ── */
  .brain-tip{
    position:absolute;padding:10px 14px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--glass-bd);border-radius:12px;
    font:400 11px var(--mono);color:var(--t2);pointer-events:none;z-index:5;
    box-shadow:0 8px 32px #00000050;transition:opacity .15s;white-space:nowrap;display:none}
  .brain-tip .bt-name{color:var(--t1);font-weight:600;margin-bottom:3px;font-family:var(--body)}
  .brain-tip .bt-act{font-size:14px;font-weight:600;margin-bottom:2px}
  .brain-tip .bt-fn{color:var(--t5);font-size:9px;letter-spacing:.5px}

  /* ── PATIENT SWITCHER ── */
  .patient-bar{display:flex;gap:5px;padding:0 0 12px;flex-wrap:wrap}
  .patient-pill{
    font:500 10px var(--body);padding:6px 14px;border:1px solid var(--bd);border-radius:20px;
    background:transparent;color:var(--t4);cursor:pointer;transition:all .25s;letter-spacing:.2px}
  .patient-pill:hover{border-color:var(--bd2);color:var(--t2)}
  .patient-pill.on{color:#fff;border-color:transparent}

  /* ── SESSION SUMMARY ── */
  .session-sum{
    background:linear-gradient(135deg,#a78bfa08,#67e8f906);border:1px solid rgba(167,139,250,.12);
    border-radius:var(--radius);padding:20px;margin:12px 0;animation:fadeIn .4s ease-out}
  .session-sum .ss-label{font:500 9px var(--mono);color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
  .session-sum .ss-text{font:400 14px/1.8 var(--body);color:var(--t1)}
  .session-sum .ss-meta{font:400 10px var(--mono);color:var(--t5);margin-top:10px}

  /* ── THEME TOGGLE ── */
  .theme-btn{
    width:28px;height:28px;border:1px solid var(--bd);border-radius:8px;background:transparent;
    color:var(--t4);cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;margin-left:auto}
  .theme-btn:hover{background:rgba(255,255,255,.04);color:var(--t2)}

  /* ── LIGHT THEME ── */
  html.light{
    --bg:#fafafa;--s1:#ffffff;--s2:#f5f5f5;--bd:#e5e5e5;--bd2:#d4d4d4;
    --t1:#171717;--t2:#262626;--t3:#525252;--t4:#737373;--t5:#a3a3a3;--dim:#d4d4d4;
    --accent:#7c3aed;--green:#059669;--amber:#d97706;--cyan:#0891b2;
    --glow1:#7c3aed18;--glow2:#0891b212;
    --glass:rgba(255,255,255,.8);--glass-bd:rgba(0,0,0,.06)}
  html.light .panel{background:var(--s1)}
  html.light .panel::before{background:radial-gradient(ellipse at 30% 0%,#7c3aed06,transparent 60%)}
  html.light .viewer{background:var(--bg)}
  html.light .viewer::before{background:radial-gradient(ellipse at 50% 40%,#7c3aed04,transparent 60%)}
  html.light .card{background:#fff;border-color:var(--bd)}
  html.light .card:hover{border-color:var(--bd2);box-shadow:0 4px 16px #0001}
  html.light .card.sel{background:linear-gradient(135deg,#f5f3ff,#fff)}

  /* ── COMPARE TABLE ── */
  .cmp-overlay{
    position:fixed;inset:0;background:#030712e6;z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
  .cmp-overlay.show{display:flex}
  .cmp-box{
    background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:24px;
    max-width:700px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 16px 64px #00000066;animation:fadeIn .3s ease-out}
  .cmp-box::-webkit-scrollbar{width:4px}
  .cmp-box::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
  .cmp-title{font:600 14px var(--mono);color:var(--t1);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  .cmp-close{border:none;background:transparent;color:var(--t4);cursor:pointer;font-size:18px;padding:4px 8px;border-radius:6px;transition:all .2s}

<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const API='http://localhost:8420';
const RC={
  prefrontal_cortex:'#818cf8',anterior_cingulate:'#fb7185',insula:'#f0abfc',
  temporal_lobe:'#a78bfa',amygdala:'#f87171',hippocampus:'#fcd34d',
  nucleus_accumbens:'#6ee7b7',parietal_lobe:'#67e8f9',occipital_lobe:'#c4b5fd',motor_cortex:'#5eead4'
};
const BR={
  prefrontal_cortex:{label:"Prefrontal Cortex",vr:[[0,1200]],fn:["reasoning","planning","calm"]},
  anterior_cingulate:{label:"Anterior Cingulate",vr:[[1200,1800]],fn:["conflict","sadness"]},
  insula:{label:"Insula",vr:[[1800,2400]],fn:["empathy","self-awareness"]},
  temporal_lobe:{label:"Temporal Lobe",vr:[[2400,4200]],fn:["language","comprehension"]},
  amygdala:{label:"Amygdala",vr:[[4200,4800]],fn:["fear","anxiety","anger"]},
  hippocampus:{label:"Hippocampus",vr:[[4800,5400]],fn:["memory","nostalgia"]},
  nucleus_accumbens:{label:"Nucleus Accumbens",vr:[[5400,5800]],fn:["joy","reward","excitement"]},
  parietal_lobe:{label:"Parietal Lobe",vr:[[5800,7800]],fn:["attention","spatial"]},
  occipital_lobe:{label:"Visual Cortex",vr:[[7800,9600]],fn:["imagery","visualization"]},
  motor_cortex:{label:"Motor Cortex",vr:[[9600,10484]],fn:["action","energy"]},
};

let md,scene,cam,ren,ctrl,bL,bR,curMesh='inflated',curAct=null,aRot=false;
let connectivityLines=[],regionCentroids={},showConnectivity=true;
let backend={status:'offline',model_mode:'demo'};
let entries=[],selEntry=null,curView='journal';
let memConvos=[],memResults=null,memQuerying=false,sampleQuestions=[],memHistory=[],selMemIdx=null;
let tlIdx=0,tlPlaying=false,tlPlayTimer=null,lerpAnimId=null,deltaDismiss=null;
let speechRec=null,speechTarget=null,curPatient='all';

// ── Platform: domain/session/subject state ──
let availDomains=[];
let curDomain='therapy';
let curSubjects=[];
let curSubject=null;  // {id, name, domain_id}
let curSession=null;  // {id, subject_id, domain_id}

// ── Color: "inferno" inspired ──
function actColor(v){
  const t=Math.max(0,Math.min(1,v));
  if(t<.15)return new THREE.Color(.06+t*2,.01+t*.3,.15+t*2.5);
  if(t<.35)return new THREE.Color(.36+(t-.15)*3,.05+(t-.15)*.8,.52+(t-.15)*1);
  if(t<.55)return new THREE.Color(.96,.12+(t-.35)*3.5,.08);
  if(t<.8)return new THREE.Color(1,.82+(t-.55)*.4,.04);
  const s=(t-.8)/.2;return new THREE.Color(1,.92+s*.08,.04+s*.92);
}
const baseC=new THREE.Color(.28,.29,.36);

// ── Three.js ──
function initScene(){
  const cv=document.getElementById('cv');
  ren=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  ren.setPixelRatio(Math.min(devicePixelRatio,2));
  ren.setClearColor(0x08090e);
  ren.toneMapping=THREE.ACESFilmicToneMapping;
  ren.toneMappingExposure=1.05;
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x08090e,.0012);
  cam=new THREE.PerspectiveCamera(36,cv.clientWidth/cv.clientHeight,1,2000);
  cam.position.set(0,25,225);
  ctrl=new OrbitControls(cam,cv);
  ctrl.enableDamping=true;ctrl.dampingFactor=.06;ctrl.minDistance=100;ctrl.maxDistance=400;ctrl.target.set(0,10,0);
  ctrl.autoRotateSpeed=.35;
  scene.add(new THREE.AmbientLight(0x444466,.7));
  const k=new THREE.DirectionalLight(0xffeedd,1.3);k.position.set(60,80,100);scene.add(k);
  const f=new THREE.DirectionalLight(0xa78bfa,.4);f.position.set(-80,30,-60);scene.add(f);
  const r=new THREE.DirectionalLight(0x67e8f9,.3);r.position.set(0,-50,-80);scene.add(r);
  const rim=new THREE.DirectionalLight(0xa78bfa,.15);rim.position.set(0,60,-100);scene.add(rim);
  onRS();window.addEventListener('resize',onRS);anim();
  initBrainTooltip(cv);
}
function onRS(){const c=ren.domElement,p=c.parentElement;ren.setSize(p.clientWidth,p.clientHeight);cam.aspect=p.clientWidth/p.clientHeight;cam.updateProjectionMatrix()}
function anim(){requestAnimationFrame(anim);if(aRot&&bL){bL.rotation.y+=.003;bR.rotation.y+=.003}ctrl.update();ren.render(scene,cam)}

// ── Brain region tooltip via raycasting ──
const _ray=new THREE.Raycaster();
const _mouse=new THREE.Vector2();
function vertexToRegion(vi){
  const n=20484;
  for(const[k,info]of Object.entries(BR)){
    for(const[st,en]of info.vr){
      const s0=Math.floor(st*n/10484),s1=Math.min(Math.floor(en*n/10484),n);
      if(vi>=s0&&vi<s1)return k;
    }
  }
  return null;
}
function initBrainTooltip(cv){
  const tip=document.getElementById('brain-tip');
  cv.addEventListener('mousemove',e=>{
    if(!bL||!bR||!tip)return;
    const rect=cv.getBoundingClientRect();
    _mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
    _mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
    _ray.setFromCamera(_mouse,cam);
    const hits=_ray.intersectObjects([bL,bR]);
    if(hits.length===0){tip.style.display='none';return}
    const hit=hits[0];
    let vi=hit.face.a;
    if(hit.object===bR)vi+=md.left.vertices.length;
    const rk=vertexToRegion(vi);
    if(!rk){tip.style.display='none';return}
    const info=BR[rk];
    const act=curAct?curAct[vi]:0;
    tip.querySelector('.bt-name').textContent=info.label;
    tip.querySelector('.bt-act').style.color=RC[rk];
    tip.querySelector('.bt-act').textContent=`${Math.round(act*100)}% activation`;
    tip.querySelector('.bt-fn').textContent=info.fn.join(' · ');
    tip.style.display='block';
    tip.style.left=Math.min(e.clientX-rect.left+12,rect.width-180)+'px';
    tip.style.top=(e.clientY-rect.top-50)+'px';
  });
  cv.addEventListener('mouseleave',()=>{if(tip)tip.style.display='none'});
}

function mkMesh(verts,faces){
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(new Float32Array(verts.flat()),3));
  const idx=[];for(const f of faces)idx.push(f[0],f[1],f[2]);
  g.setIndex(idx);g.computeVertexNormals();
  const c=new Float32Array(verts.length*3);
  for(let i=0;i<verts.length;i++){c[i*3]=baseC.r;c[i*3+1]=baseC.g;c[i*3+2]=baseC.b}
  g.setAttribute('color',new THREE.BufferAttribute(c,3));
  return new THREE.Mesh(g,new THREE.MeshStandardMaterial({vertexColors:true,roughness:.48,metalness:.08,side:THREE.DoubleSide,envMapIntensity:.5}));
}

function loadInto(type){
  if(!md)return;
  clearConnectivity();
  if(bL){scene.remove(bL);scene.remove(bR)}
  const lv=type==='inflated'?md.left.inflated:md.left.vertices;
  const rv=type==='inflated'?md.right.inflated:md.right.vertices;
  bL=mkMesh(lv,md.left.faces);bR=mkMesh(rv,md.right.faces);
  const gap=type==='inflated'?2:0;bL.position.x=-gap;bR.position.x=gap;
  scene.add(bL);scene.add(bR);
  computeRegionCentroids(lv,rv,gap);
  if(curAct)paintVerts(curAct);
}

// ── Region centroids for connectivity lines ──
function computeRegionCentroids(lv,rv,gap){
  regionCentroids={};
  const allVerts=[...lv,...rv.map(v=>[v[0]+gap*2,v[1],v[2]])];
  const n=allVerts.length;
  for(const[k,info]of Object.entries(BR)){
    let sx=0,sy=0,sz=0,cnt=0;
    for(const[st,en]of info.vr){
      const s0=Math.floor(st*n/10484),s1=Math.min(Math.floor(en*n/10484),n);
      for(let i=s0;i<s1;i++){
        if(allVerts[i]){sx+=allVerts[i][0];sy+=allVerts[i][1];sz+=allVerts[i][2];cnt++}
      }
    }
    if(cnt>0)regionCentroids[k]=new THREE.Vector3(sx/cnt,sy/cnt,sz/cnt);
  }
}

function clearConnectivity(){
  connectivityLines.forEach(l=>scene.remove(l));
  connectivityLines=[];
}

function drawConnectivity(regions){
  clearConnectivity();
  if(!showConnectivity||!regions)return;
  const active=Object.entries(regions).filter(([_,v])=>(v.activation||0)>.4);
  if(active.length<2)return;

  for(let i=0;i<active.length;i++){
    for(let j=i+1;j<active.length;j++){
      const[kA,vA]=active[i],[kB,vB]=active[j];
      const pA=regionCentroids[kA],pB=regionCentroids[kB];
      if(!pA||!pB)continue;
      const strength=Math.min(vA.activation||0,vB.activation||0);
      if(strength<.3)continue;

      const mid=new THREE.Vector3().lerpVectors(pA,pB,.5);
      mid.y+=8+strength*10;
      const curve=new THREE.QuadraticBezierCurve3(pA,mid,pB);
      const pts=curve.getPoints(24);
      const g=new THREE.BufferGeometry().setFromPoints(pts);

      const cA=new THREE.Color(RC[kA]||'#818cf8');
      const cB=new THREE.Color(RC[kB]||'#818cf8');
      const colors=new Float32Array(pts.length*3);
      for(let p=0;p<pts.length;p++){
        const t=p/(pts.length-1);
        const c=new THREE.Color().lerpColors(cA,cB,t);
        colors[p*3]=c.r;colors[p*3+1]=c.g;colors[p*3+2]=c.b;
      }
      g.setAttribute('color',new THREE.BufferAttribute(colors,3));

      const mat=new THREE.LineBasicMaterial({
        vertexColors:true,transparent:true,opacity:strength*.7,
        linewidth:1,blending:THREE.AdditiveBlending
      });
      const line=new THREE.Line(g,mat);
      scene.add(line);
      connectivityLines.push(line);
    }
  }
}

window.togConn=function(){
  showConnectivity=!showConnectivity;
  document.getElementById('conn-btn').classList.toggle('on',showConnectivity);
  if(!showConnectivity)clearConnectivity();
};

function paintVerts(va){
  curAct=va;if(!bL||!bR)return;
  const nL=md.left.vertices.length,tot=va.length;
  const lc=bL.geometry.attributes.color;
  for(let i=0;i<nL&&i<tot;i++){
    const a=va[i];if(a>.12){const c=actColor(a);lc.setXYZ(i,c.r,c.g,c.b)}
    else{const s=.25+a*.5;lc.setXYZ(i,s*.45,s*.46,s*.56)}
  }
  lc.needsUpdate=true;
  const rc=bR.geometry.attributes.color,nR=md.right.vertices.length;
  for(let i=0;i<nR;i++){
    const gi=i+nL,a=gi<tot?va[gi]:0;
    if(a>.12){const c=actColor(a);rc.setXYZ(i,c.r,c.g,c.b)}
    else{const s=.25+a*.5;rc.setXYZ(i,s*.45,s*.46,s*.56)}
  }
  rc.needsUpdate=true;
}

function regionToVerts(regions){
  const n=20484,v=new Array(n).fill(0);
  for(const[k,info]of Object.entries(BR)){
    const a=regions[k]?.activation||0;if(a<.05)continue;
    for(const[st,en]of info.vr){
      const s0=Math.floor(st*n/10484),s1=Math.min(Math.floor(en*n/10484),n),mid=(s0+s1)/2,half=(s1-s0)/2;
      for(let i=s0;i<s1;i++){
        const d=Math.abs(i-mid)/half,fo=Math.max(0,1-d*d);
        v[i]=Math.max(v[i],a*(.4+.6*fo)+(Math.random()-.5)*.06*a);
        v[i]=Math.max(0,Math.min(1,v[i]));
      }
    }
  }
  return v;
}

function clearPaint(){
  if(!bL||!bR)return;curAct=null;
  [bL,bR].forEach(m=>{const c=m.geometry.attributes.color;for(let i=0;i<c.count;i++)c.setXYZ(i,baseC.r,baseC.g,baseC.b);c.needsUpdate=true});
}

// ── UI ──
function updRegPanel(regions){
  const p=document.getElementById('rpanel'),b=document.getElementById('rbars');
  if(!regions){p.style.opacity=0;clearConnectivity();return}p.style.opacity=1;
  const sorted=Object.entries(regions).map(([k,v])=>({key:k,...v})).sort((a,b)=>(b.activation||0)-(a.activation||0));
  b.innerHTML=sorted.map((r,i)=>{
    const pct=Math.round((r.activation||0)*100),c=RC[r.key]||'#818cf8';
    return`<div class="rr" style="animation:fadeIn .3s ${i*.04}s both"><span class="rr-name">${r.label}</span><div class="rr-bg"><div class="rr-bar" style="width:${pct}%;background:linear-gradient(90deg,${c},${c}cc);box-shadow:0 0 8px ${c}33"></div></div><span class="rr-val">${pct}%</span></div>`;
  }).join('');
  drawConnectivity(regions);
}

function updSummary(entry){
  const box=document.getElementById('sumbox');
  if(!entry?.summary&&!entry?.dominant){box.style.display='none';return}
  box.style.display='block';
  document.getElementById('sumtext').textContent=entry.summary||'';
  const parts=[];
  if(entry.dominant)parts.push(`Dominant: ${entry.dominant}`);
  if(entry.mode==='tribe')parts.push('TRIBE v2');
  else if(entry.mode==='fallback')parts.push('API mode');
  else parts.push('Demo mode');
  if(entry.processing_time_ms)parts.push(`${Math.round(entry.processing_time_ms)}ms`);
  if(entry.n_vertices)parts.push(`${entry.n_vertices} vertices`);
  document.getElementById('summeta').textContent=parts.join(' · ');
}

function fmtTime(ts){const d=Date.now()-ts;if(d<3600000)return`${Math.floor(d/60000)}m ago`;if(d<86400000)return`${Math.floor(d/3600000)}h ago`;return`${Math.floor(d/86400000)}d ago`}

function renderList(){
  const el=document.getElementById('list');
  if(curView==='patterns'){renderPatterns(el);return}
  if(curView==='timeline'){renderTimeline(el);return}
  if(curView==='memory'){renderMemory(el);return}
  el.innerHTML=entries.map((e,i)=>{
    const sel=selEntry?.id===e.id;
    const topR=e.regions?Object.entries(e.regions).sort((a,b)=>(b[1].activation||0)-(a[1].activation||0)):[];
    const topC=topR[0]?RC[topR[0][0]]||'#6366f1':'#6366f1';
    const mTag=e.mode==='tribe'?'<span class="tag" style="background:#34d39918;color:#34d399;border:1px solid #34d39922">TRIBE</span>':e.mode==='fallback'?'<span class="tag" style="background:#fbbf2418;color:#fbbf24;border:1px solid #fbbf2422">API</span>':'';
    const txt=e.text.length>130?e.text.slice(0,130)+'…':e.text;
    return`<div class="card${sel?' sel':''}" onclick="window._sel(${i})" style="${sel?'border-left-color:'+topC:''}">
      <div class="card-top"><div style="display:flex;gap:6px;align-items:center"><span class="card-dom" style="color:${topC}">${e.dominant||e.summary||''}</span>${mTag}</div><span class="card-time">${fmtTime(e.timestamp)}</span></div>
      <p class="card-text">${txt}</p>
      <div class="card-tags">${topR.slice(0,4).map(([k,v])=>{const c=RC[k]||'#6366f1';return`<span class="tag" style="background:${c}18;color:${c}">${v.label} ${Math.round((v.activation||0)*100)}%</span>`}).join('')}</div>
    </div>`;
  }).join('');
}

function renderPatterns(el){
  if(entries.length<2){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--t5)">Add more entries to detect neural patterns.</div>';return}
  const totals={};
  entries.forEach(e=>{if(!e.regions)return;Object.entries(e.regions).forEach(([k,v])=>{if(!totals[k])totals[k]={t:0,n:0,l:v.label};totals[k].t+=v.activation||0;totals[k].n++})});
  let topK=null,topA=0;
  for(const[k,v]of Object.entries(totals)){const a=v.t/entries.length;if(a>topA){topA=a;topK=k}}
  const pats=[];
  if(topK&&topA>.25)pats.push({title:`${totals[topK].l} is your baseline`,desc:`Across ${entries.length} entries, this region averages ${(topA*100).toFixed(0)}% activation.`,color:RC[topK]||'#6366f1',icon:'◎'});
  if(entries.length>=3){
    const half=Math.ceil(entries.length/2),rec=entries.slice(0,half),old=entries.slice(half);
    let bK=null,bV=0;
    for(const k of Object.keys(totals)){const ra=rec.reduce((s,e)=>s+(e.regions?.[k]?.activation||0),0)/rec.length;const oa=old.reduce((s,e)=>s+(e.regions?.[k]?.activation||0),0)/old.length;const d=ra-oa;if(d>bV){bV=d;bK=k}}
    if(bK&&bV>.08)pats.push({title:`Rising ${totals[bK].l}`,desc:`Up ${(bV*100).toFixed(0)}% in recent entries.`,color:RC[bK]||'#6366f1',icon:'↗'});
  }
  const coAct={};
  entries.forEach(e=>{if(!e.regions)return;const act=Object.entries(e.regions).filter(([_,v])=>(v.activation||0)>.5);for(let i=0;i<act.length;i++)for(let j=i+1;j<act.length;j++){const p=[act[i][1].label,act[j][1].label].sort().join(' ↔ ');coAct[p]=(coAct[p]||0)+1}});
  const topPair=Object.entries(coAct).sort((a,b)=>b[1]-a[1])[0];
  if(topPair&&topPair[1]>=2)pats.push({title:'Neural coupling',desc:`${topPair[0]} co-activate in ${topPair[1]}/${entries.length} entries.`,color:'#06b6d4',icon:'⟷'});
  const patsHtml=pats.length?pats.map((p,i)=>`<div style="background:linear-gradient(135deg,${p.color}0c,transparent);border:1px solid ${p.color}28;border-radius:14px;padding:16px;margin-bottom:10px;animation:fadeIn .3s ${i*.08}s both;border-left:3px solid ${p.color}"><div style="font:600 13px var(--mono);color:${p.color};margin-bottom:6px;display:flex;align-items:center;gap:8px"><span style="font-size:16px">${p.icon}</span>${p.title}</div><div style="font-size:12px;color:var(--t3);line-height:1.6">${p.desc}</div></div>`).join(''):'<div style="padding:60px 30px;text-align:center"><div style="font:500 14px var(--body);color:var(--t4);margin-bottom:8px">No patterns detected yet</div><div style="font:11px var(--mono);color:var(--dim)">Add more journal entries to discover neural patterns across sessions.</div></div>';
  const cmpBtn=memHistory.length>=2?`<button class="btn" style="width:100%;margin-top:10px;padding:10px;font-size:11px;background:linear-gradient(135deg,#06b6d4,#0891b2);box-shadow:0 4px 16px #06b6d433" onclick="window._showCmp()">Compare Activations</button>`:'';
  const exportBtn=(entries.length+memHistory.length)>0?`<button class="btn btn-go" style="width:100%;margin-top:10px;padding:10px;font-size:11px;background:linear-gradient(135deg,#818cf8,#6366f1)" onclick="window._exportReport()">Export Session Report</button>`:'';
  el.innerHTML=patsHtml+cmpBtn+exportBtn;
}

}

async function memoryQuery(query){
  memQuerying=true;memResults=null;selMemIdx=null;renderList();
  try{
    if(backend.status==='ok'){
      const body={query,top_k:5,run_tribe:true,domain_id:curDomain};
      if(curSession)body.session_id=curSession.id;
      if(curSubject)body.subject_id=curSubject.id;
      const r=await fetch(`${API}/memory/query`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      memResults=await r.json();
    }else{
      memResults=demoMemoryQuery(query);
    }
    memResults.query=query;
    memResults.timestamp=Date.now();
    memHistory.unshift(memResults);
    selMemIdx=0;
    if(memResults.tribe){
      const t=memResults.tribe;
      updRegPanel(t.regions);
      updSummary({summary:memResults.generated_answer.slice(0,80),dominant:'memory retrieval',mode:t.mode,processing_time_ms:memResults.processing_time_ms,n_vertices:t.n_vertices});
      if(t.vertex_activations)paintVerts(t.vertex_activations);
      else if(t.regions)paintVerts(regionToVerts(t.regions));
    }
  }catch(e){console.error('Memory query failed:',e);memResults={generated_answer:'Query failed: '+e.message,retrieved_memories:[],processing_time_ms:0,query,timestamp:Date.now()};memHistory.unshift(memResults);selMemIdx=0}
  memQuerying=false;renderList();
}

function selectMemHistory(i){
  selMemIdx=i;
  memResults=memHistory[i];
  renderList();
  if(memResults.tribe){
    const t=memResults.tribe;
    updRegPanel(t.regions);
    updSummary({summary:memResults.generated_answer.slice(0,80),dominant:'memory retrieval',mode:t.mode,processing_time_ms:memResults.processing_time_ms,n_vertices:t.n_vertices});
    if(t.vertex_activations)paintVerts(t.vertex_activations);
    else if(t.regions)paintVerts(regionToVerts(t.regions));
  }
}

// ── Timeline View ──
function tlData(){return[...memHistory].reverse()}

function getRegions(h){return h.tribe?.regions||null}
function getVerts(h){
  if(h.tribe?.vertex_activations)return h.tribe.vertex_activations;
  if(h.tribe?.regions)return regionToVerts(h.tribe.regions);
  return null;
}

  if(data.length<2){
    el.innerHTML=`<div style="padding:60px 24px;text-align:center">
      <div style="font:500 14px var(--body);color:var(--t4);margin-bottom:8px">Not enough data yet</div>

    document.getElementById('playback').classList.remove('show');
    return;
  }
  document.getElementById('playback').classList.add('show');
  const regionKeys=Object.keys(BR);

  const legendHtml=regionKeys.map(k=>
    `<span class="tl-leg-item"><span class="tl-leg-dot" style="background:${RC[k]}"></span>${BR[k].label}</span>`
  ).join('');

  const chronoIdx=data.length-1-tlIdx;
  const rowsHtml=data.map((h,i)=>{
    const sel=i===(data.length-1-tlIdx);
    const reg=getRegions(h);
    const topR=reg?Object.entries(reg).sort((a,b)=>(b[1].activation||0)-(a[1].activation||0))[0]:null;
    const topLabel=topR?`${topR[1].label} ${Math.round((topR[1].activation||0)*100)}%`:'';

  }).join('');

  el.innerHTML=`<div class="tl-wrap">
    <div class="tl-chart-wrap"><canvas id="tl-cv"></canvas><div id="tl-tip" class="tl-tooltip" style="opacity:0"></div></div>
    <div class="tl-legend">${legendHtml}</div>
    <div class="ov-title">Queries (oldest → newest)</div>
    <div class="tl-queries">${rowsHtml}</div>
  </div>`;

  updPlaybackLabel();
  requestAnimationFrame(()=>drawTimelineChart());
}

function drawTimelineChart(){
  const cv=document.getElementById('tl-cv');
  if(!cv)return;
  const wrap=cv.parentElement;
  const W=wrap.clientWidth,H=180;
  cv.width=W*devicePixelRatio;cv.height=H*devicePixelRatio;
  cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');
  ctx.scale(devicePixelRatio,devicePixelRatio);

  const data=tlData();
  const n=data.length;
  const pad={l:12,r:12,t:14,b:14};
  const cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;

  ctx.fillStyle='#030712';ctx.fillRect(0,0,W,H);

  for(let i=0;i<=4;i++){
    const y=pad.t+ch*(1-i/4);
    ctx.strokeStyle='#1a234044';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
  }

  const regionKeys=Object.keys(BR);
  const series=regionKeys.map(k=>{
    return data.map(h=>{const reg=getRegions(h);return reg?.[k]?.activation||0});
  });

  const xStep=n>1?cw/(n-1):0;

  regionKeys.forEach((k,ri)=>{
    const vals=series[ri];
    const color=RC[k];
    ctx.strokeStyle=color;ctx.lineWidth=1.8;ctx.globalAlpha=.7;
    ctx.beginPath();
    vals.forEach((v,i)=>{
      const x=pad.l+i*xStep,y=pad.t+ch*(1-v);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();
    ctx.globalAlpha=1;
  });

  const selChronoIdx=data.length-1-tlIdx;
  if(selChronoIdx>=0&&selChronoIdx<n){
    const x=pad.l+selChronoIdx*xStep;
    ctx.strokeStyle='#818cf844';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+ch);ctx.stroke();
    ctx.setLineDash([]);

    regionKeys.forEach((k,ri)=>{
      const v=series[ri][selChronoIdx];
      const y=pad.t+ch*(1-v);
      ctx.fillStyle=RC[k];ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#030712';ctx.lineWidth=1.5;ctx.stroke();
    });
  }

  cv.onmousemove=function(e){
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const idx=Math.round((mx-pad.l)/xStep);
    const tip=document.getElementById('tl-tip');
    if(idx<0||idx>=n||!tip){tip&&(tip.style.opacity='0');return}
    const h=data[idx];const reg=getRegions(h);
    if(!reg){tip.style.opacity='0';return}
    const sorted=Object.entries(reg).sort((a,b)=>(b[1].activation||0)-(a[1].activation||0));
    const lines=sorted.slice(0,5).map(([k,v])=>`<span style="color:${RC[k]}">${v.label}: ${Math.round((v.activation||0)*100)}%</span>`);
    const q=h.query?h.query.slice(0,40)+'…':'Query '+(idx+1);
    tip.innerHTML=`<div style="color:var(--t1);margin-bottom:4px;font-weight:600">#${idx+1} ${q}</div>${lines.join('<br>')}`;
    const tx=Math.min(mx+10,W-200);
    tip.style.left=tx+'px';tip.style.top='10px';tip.style.opacity='1';
  };
  cv.onmouseleave=function(){const tip=document.getElementById('tl-tip');if(tip)tip.style.opacity='0'};
  cv.onclick=function(e){
    const rect=cv.getBoundingClientRect();
    const mx=e.clientX-rect.left;
    const idx=Math.round((mx-pad.l)/xStep);
    if(idx>=0&&idx<n)tlGoTo(n-1-idx);
  };
}

// ── Smooth vertex lerp ──
function animateToActivation(targetVerts,duration){
  if(lerpAnimId){cancelAnimationFrame(lerpAnimId);lerpAnimId=null}
  if(!targetVerts)return;
  const fromVerts=curAct?[...curAct]:new Array(targetVerts.length).fill(0);
  const start=performance.now();
  function tick(now){
    const t=Math.min((now-start)/duration,1);
    const ease=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    const lerped=new Array(targetVerts.length);
    for(let i=0;i<targetVerts.length;i++){
      lerped[i]=fromVerts[i]+(targetVerts[i]-fromVerts[i])*ease;
    }
    paintVerts(lerped);
    if(t<1)lerpAnimId=requestAnimationFrame(tick);
    else lerpAnimId=null;
  }
  lerpAnimId=requestAnimationFrame(tick);
}

// ── Delta badges ──
function showDelta(prevRegions,curRegions){
  const ov=document.getElementById('delta-ov');
  if(!ov||!prevRegions||!curRegions){if(ov)ov.innerHTML='';return}
  if(deltaDismiss){clearTimeout(deltaDismiss);deltaDismiss=null}
  const deltas=[];
  for(const k of Object.keys(BR)){
    const prev=prevRegions[k]?.activation||0;
    const cur=curRegions[k]?.activation||0;
    const d=cur-prev;
    if(Math.abs(d)>.02)deltas.push({key:k,label:BR[k].label,delta:d,color:RC[k]});
  }
  deltas.sort((a,b)=>Math.abs(b.delta)-Math.abs(a.delta));
  ov.innerHTML=deltas.slice(0,4).map(d=>{
    const up=d.delta>0;
    const pct=Math.round(Math.abs(d.delta)*100);
    return`<div class="delta-badge">
      <span class="db-arrow" style="color:${up?'#34d399':'#f87171'}">${up?'▲':'▼'}</span>
      <span class="db-name">${d.label}</span>
      <span class="db-val" style="color:${up?'#34d399':'#f87171'}">${up?'+':'−'}${pct}%</span>
    </div>`;
  }).join('');
  deltaDismiss=setTimeout(()=>{ov.innerHTML='';deltaDismiss=null},4000);
}

// ── Brain Diff Mode ──
let diffMode=false;
function paintDiff(vertsA,vertsB){
  if(!bL||!bR||!vertsA||!vertsB)return;
  const nL=md.left.vertices.length,n=Math.min(vertsA.length,vertsB.length);
  const diffArr=new Array(n);
  for(let i=0;i<n;i++)diffArr[i]=vertsB[i]-vertsA[i];
  let maxAbs=0;
  for(let i=0;i<n;i++)if(Math.abs(diffArr[i])>maxAbs)maxAbs=Math.abs(diffArr[i]);
  if(maxAbs<.01)maxAbs=1;

  const lc=bL.geometry.attributes.color;
  for(let i=0;i<nL&&i<n;i++){
    const d=diffArr[i]/maxAbs;
    if(Math.abs(d)<.05){lc.setXYZ(i,.2,.22,.28)}
    else if(d>0){lc.setXYZ(i,.1,.2+d*.7,.1+d*.5)}
    else{const a=-d;lc.setXYZ(i,.2+a*.7,.1,.1)}
  }
  lc.needsUpdate=true;
  const rc=bR.geometry.attributes.color,nR=md.right.vertices.length;
  for(let i=0;i<nR;i++){
    const gi=i+nL;if(gi>=n)break;
    const d=diffArr[gi]/maxAbs;
    if(Math.abs(d)<.05){rc.setXYZ(i,.2,.22,.28)}
    else if(d>0){rc.setXYZ(i,.1,.2+d*.7,.1+d*.5)}
    else{const a=-d;rc.setXYZ(i,.2+a*.7,.1,.1)}
  }
  rc.needsUpdate=true;
}

function generateFollowUps(results){
  if(!results||!results.query)return[];
  const q=results.query;
  const speaker=q.match(/^(\w+),/)?.[1]||'';
  const mems=results.retrieved_memories||[];
  const topics=new Set();
  mems.forEach(m=>{
    const words=m.text.toLowerCase();
    if(words.includes('dance')||words.includes('dancing'))topics.add('dance');
    if(words.includes('job')||words.includes('work')||words.includes('career'))topics.add('career');
    if(words.includes('stress')||words.includes('overwhelm'))topics.add('stress');
    if(words.includes('art')||words.includes('paint')||words.includes('creat'))topics.add('art');
    if(words.includes('pet')||words.includes('cat')||words.includes('dog'))topics.add('pets');
    if(words.includes('friend')||words.includes('family')||words.includes('relationship'))topics.add('relationships');
    if(words.includes('camp')||words.includes('hike')||words.includes('outdoor'))topics.add('outdoors');
    if(words.includes('workshop')||words.includes('class')||words.includes('learn'))topics.add('learning');
    if(words.includes('volunteer')||words.includes('community')||words.includes('support'))topics.add('community');
    if(words.includes('business')||words.includes('studio')||words.includes('plan'))topics.add('business');
  });
  const followUps=[];
  const s=speaker||'them';
  const templates={
    dance:[`${s}, how does dancing make you feel emotionally?`,`${s}, when did you first start dancing?`],
    career:[`${s}, what does your ideal career look like?`,`${s}, how do you feel about your professional growth?`],
    stress:[`${s}, what helps you unwind after a stressful day?`,`${s}, how has your stress changed over the past few months?`],
    art:[`${s}, what inspires your artwork?`,`${s}, how does creating art affect your mood?`],
    pets:[`${s}, tell me about your relationship with your pets.`,`${s}, how do your pets help with your well-being?`],
    relationships:[`${s}, how have your closest relationships been recently?`,`${s}, who do you turn to when you need support?`],
    outdoors:[`${s}, what do you enjoy most about being outdoors?`,`${s}, how does nature affect your mental state?`],
    learning:[`${s}, what new skills are you excited about?`,`${s}, how do workshops make you feel?`],
    community:[`${s}, what motivates you to volunteer?`,`${s}, how does community involvement affect your outlook?`],
    business:[`${s}, what excites you most about your business plans?`,`${s}, what challenges are you facing with starting your business?`],
  };
  for(const topic of topics){
    if(templates[topic])followUps.push(...templates[topic]);
  }
  if(followUps.length===0){
    followUps.push(
      `${s}, how have you been feeling overall lately?`,
      `${s}, what's been on your mind the most this week?`,
      `${s}, is there anything you'd like to explore further?`
    );
  }
  const asked=new Set(memHistory.map(h=>(h.query||'').toLowerCase()));
  return followUps.filter(f=>!asked.has(f.toLowerCase())).slice(0,4);
}

let sessionSummary=null,summaryLoading=false;

    return{query:h.query,topRegions:top.map(([k,v])=>`${v.label} (${Math.round((v.activation||0)*100)}%)`).join(', ')};
  });
  const prompt=`You are a clinical neuroscience therapist assistant. Based on the following therapy session queries and their brain activation patterns, write a concise 3-4 sentence session summary. Focus on emotional patterns, shifts in neural activation, and therapeutic insights.\n\nSession queries:\n${queriesData.map((q,i)=>`${i+1}. "${q.query}" → Top activations: ${q.topRegions}`).join('\n')}\n\nWrite the summary in second person addressing the therapist (e.g. "Your patient showed...").`;
  try{

      if(r.ok){const d=await r.json();sessionSummary=d.text||d.response||'Summary unavailable.'}
      else sessionSummary=fallbackSummary(queriesData);
    }else{sessionSummary=fallbackSummary(queriesData)}
  }catch{sessionSummary=fallbackSummary(queriesData)}
  summaryLoading=false;renderList();
}
function fallbackSummary(data){
  const regions={};
  memHistory.forEach(h=>{const reg=h.tribe?.regions||{};Object.entries(reg).forEach(([k,v])=>{if(!regions[k])regions[k]={t:0,n:0,l:v.label};regions[k].t+=(v.activation||0);regions[k].n++})});
  const sorted=Object.entries(regions).sort((a,b)=>(b[1].t/b[1].n)-(a[1].t/a[1].n));
  const top=sorted.slice(0,3).map(([k,v])=>`${v.l} (avg ${Math.round(v.t/v.n*100)}%)`);
  return`Across ${memHistory.length} queries, the dominant activation regions were ${top.join(', ')}. The session covered ${data.length} topics with varying emotional intensity across memory retrieval tasks.`;
}

// ── Activation Similarity Search ──
function cosineSim(a,b){
  if(!a||!b||a.length!==b.length)return 0;
  let dot=0,na=0,nb=0;
  for(let i=0;i<a.length;i++){dot+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i]}
  return(na&&nb)?dot/Math.sqrt(na*nb):0;
}
function findSimilar(idx){
  if(memHistory.length<2)return[];
  const target=memHistory[idx];
  const tVerts=getVerts(target);
  if(!tVerts)return[];
  const results=[];
  memHistory.forEach((h,i)=>{
    if(i===idx)return;
    const v=getVerts(h);
    if(!v)return;
    const sim=cosineSim(tVerts,v);
    results.push({idx:i,query:h.query,sim});
  });
  return results.sort((a,b)=>b.sim-a.sim).slice(0,5);
}
window._findSimilar=function(idx){
  const results=findSimilar(idx);
  const el=document.getElementById('sim-results');
  if(!el)return;
  if(results.length===0){el.innerHTML='<div style="color:var(--t5);font:11px var(--mono);padding:8px">Need at least 2 queries to find similar patterns.</div>';return}
  el.innerHTML=`<div class="sim-results"><div style="font:600 10px var(--mono);color:var(--t4);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Similar Brain Patterns</div>${results.map(r=>
    `<div class="sim-match" onclick="window._selMem(${r.idx})"><span class="sim-pct">${Math.round(r.sim*100)}%</span><span class="sim-q">${r.query||'Query '+(r.idx+1)}</span></div>`
  ).join('')}</div>`;
};

// ── Compare Table ──
let cmpIndices=[];
function showCompare(){
  if(memHistory.length<2)return;
  cmpIndices=[0,1];
  renderCompare();
  document.getElementById('cmp-overlay').classList.add('show');
}
function renderCompare(){
  const el=document.getElementById('cmp-body');
  const queries=memHistory.slice(0,Math.min(5,memHistory.length));

  const selectorHtml=`<div style="display:flex;gap:8px;margin-bottom:16px">${[0,1].map(slot=>
    `<select style="flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--t2);font:11px var(--mono);padding:8px;outline:none" onchange="window._cmpSel(${slot},this.value)">
      ${memHistory.map((h,i)=>`<option value="${i}" ${i===cmpIndices[slot]?'selected':''}>${'Q'+(memHistory.length-i)}: ${(h.query||'').slice(0,40)}</option>`).join('')}
    </select>`
  ).join('<span style="color:var(--t5);font:600 13px var(--mono);display:flex;align-items:center">vs</span>')}</div>`;

  const regA=getRegions(memHistory[cmpIndices[0]])||{};
  const regB=getRegions(memHistory[cmpIndices[1]])||{};
  const allKeys=Object.keys(BR);

  const rows=allKeys.map(k=>{
    const aVal=regA[k]?.activation||0;
    const bVal=regB[k]?.activation||0;
    const diff=bVal-aVal;
    const diffStr=diff>0?`<span style="color:#34d399">+${Math.round(diff*100)}%</span>`:diff<0?`<span style="color:#f87171">${Math.round(diff*100)}%</span>`:`<span style="color:var(--t5)">—</span>`;
    const c=RC[k]||'#818cf8';
    return`<tr>
      <td style="color:var(--t2);font-weight:500">${BR[k].label}</td>
      <td><span class="cmp-bar" style="width:${Math.round(aVal*100)}px;background:${c}"></span>${Math.round(aVal*100)}%</td>
      <td><span class="cmp-bar" style="width:${Math.round(bVal*100)}px;background:${c}"></span>${Math.round(bVal*100)}%</td>
      <td>${diffStr}</td>
    </tr>`;
  }).join('');

  el.innerHTML=`${selectorHtml}<table class="cmp-table"><thead><tr><th>Region</th><th>Query A</th><th>Query B</th><th>Δ Change</th></tr></thead><tbody>${rows}</tbody></table>`;
}
window._cmpSel=function(slot,val){cmpIndices[slot]=parseInt(val);renderCompare()};
window._closeCmp=function(){document.getElementById('cmp-overlay').classList.remove('show')};
window._showCmp=showCompare;

// ── Animated brain entrance ──
let brainEntrance=true;
function animateBrainEntrance(){
  if(!bL||!bR||!brainEntrance)return;
  brainEntrance=false;
  const startY=bL.rotation.y;
  const startTime=performance.now();
  const duration=1800;
  const startScale=0.01;
  bL.scale.setScalar(startScale);bR.scale.setScalar(startScale);
  bL.material.opacity=0;bR.material.opacity=0;
  bL.material.transparent=true;bR.material.transparent=true;
  function tick(now){
    const t=Math.min((now-startTime)/duration,1);
    const ease=t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
    const scale=startScale+(1-startScale)*ease;
    bL.scale.setScalar(scale);bR.scale.setScalar(scale);
    bL.rotation.y=startY+Math.PI*2*(1-ease);
    bR.rotation.y=startY+Math.PI*2*(1-ease);
    bL.material.opacity=Math.min(1,t*2);
    bR.material.opacity=Math.min(1,t*2);
    if(t<1)requestAnimationFrame(tick);
    else{bL.material.transparent=false;bR.material.transparent=false;bL.rotation.y=0;bR.rotation.y=0}
  }
  requestAnimationFrame(tick);
}

}

  const sub=document.getElementById('sub-text');

}

  if(_domainDetailCache[domainId])return _domainDetailCache[domainId];
  try{const r=await fetch(`${API}/domains/${domainId}`);const d=await r.json();_domainDetailCache[domainId]=d;return d}
  catch{return null}
}

async function loadSubjects(){
  try{
    const r=await fetch(`${API}/subjects?domain_id=${curDomain}`);
    const d=await r.json();

  }catch{curSubjects=[]}

  const el=document.getElementById('subject-bar');

  const label=domConf?domConf.name.split(' ')[0]:'Subject';

    ).join('')+

async function pickSubject(sid){
  curSubject=curSubjects.find(s=>s.id===sid)||null;
  if(curSubject){

      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({subject_id:curSubject.id,domain_id:curDomain})
    });

  }
  renderSubjectBar();
}

async function addSubject(){
  const name=prompt('Enter name:');
  if(!name||!name.trim())return;
  try{
    const r=await fetch(`${API}/subjects`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({domain_id:curDomain,name:name.trim()})
    });
    const s=await r.json();
    curSubjects.push(s);
    await pickSubject(s.id);

async function loadSubjectTrends(subjectId){
  try{const r=await fetch(`${API}/subjects/${subjectId}/trends`);return await r.json()}
  catch{return null}
}

function renderTrendsCard(trends){
  if(!trends||!trends.regions||Object.keys(trends.regions).length===0)return '';
  const rows=Object.entries(trends.regions).sort((a,b)=>Math.abs(b[1].change)-Math.abs(a[1].change)).slice(0,8);
  return `<div class="trends-card">
    <div class="trends-title">Longitudinal Trends · ${trends.total_queries} queries</div>
    ${rows.map(([k,v])=>{
      const cls=v.change>0.02?'trend-up':v.change<-0.02?'trend-down':'trend-flat';
      const arrow=v.change>0.02?'↑':v.change<-0.02?'↓':'→';
      return `<div class="trend-row">
        <span class="trend-label">${v.label}</span>
        <span class="trend-arrow ${cls}">${arrow} ${Math.abs(v.change*100).toFixed(1)}%</span>
        <span class="trend-val">${(v.current_avg*100).toFixed(0)}% avg</span>
      </div>`;
    }).join('')}
    <div style="font:400 9px var(--mono);color:var(--t5);margin-top:8px">
      Top emotions: ${Object.entries(trends.emotions||{}).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k,v])=>`${k}(${v})`).join(', ')||'—'}
    </div>
  </div>`;
}

async function uploadFile(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.json,.txt,.csv';
  input.onchange=async function(){
    const file=input.files[0];if(!file)return;
    const fd=new FormData();
    fd.append('file',file);
    fd.append('domain_id',curDomain);
    if(curSubject)fd.append('subject_id',curSubject.id);
    try{
      const r=await fetch(`${API}/upload`,{method:'POST',body:fd});
      const d=await r.json();
      alert(`Uploaded ${file.name}: ${d.chunks_ingested} memories ingested.`);
      loadMemoryMeta();
    }catch(e){alert('Upload failed: '+e.message)}
  };
  input.click();
}
window._uploadFile=uploadFile;
